<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Management System - Add Blog</title>
  <link rel="stylesheet" href="../Day3/style.css" />
</head>
<body>

  <!-- Navigation Bar -->
  <header class="navbar">
    <h1 class="logo">My Blog</h1>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="add-blog.html">Add Blog</a></li>
      </ul>
    </nav>
  </header>

  <!-- Add Blog Form -->
  <main class="container">
    <h2>Add New Blog</h2>

    <form id="addBlogForm" class="blog-form">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" placeholder="Enter blog title" />

      <label for="content">Content</label>
      <textarea id="content" name="content" rows="6" placeholder="Write your blog content here..."></textarea>

      <span class="error-message" id="formError"></span>

      <button type="submit" class="btn-primary">Publish Blog</button>
    </form>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 My Blog. Built during the Codomax Full Stack Internship.</p>
  </footer>

  <script src="../Day4/script.js"></script>
</body>
</html>
